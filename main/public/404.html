<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0B1220" />
    <meta name="robots" content="noindex, nofollow" />
    <meta
      name="description"
      content="The requested portfolio page could not be found. Return to Waffy Ahmed's software engineering portfolio."
    />
    <link rel="canonical" href="https://waffy.dev/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo192.png" />
    <title>Page Not Found | Waffy Ahmed</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Cambria, Georgia, serif;
        background: #f4f1ea;
        color: #0b1220;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 32px 18px;
        background: #f4f1ea;
      }

      main {
        width: min(100%, 42rem);
        border: 1px solid rgba(15, 23, 42, 0.16);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.86);
        padding: clamp(28px, 6vw, 48px);
        text-align: center;
        box-shadow: 0 24px 70px rgba(15, 23, 42, 0.12);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        border: 1px solid rgba(194, 65, 12, 0.22);
        background: #ffedd5;
        color: #9a3412;
        font: 700 0.75rem/1.2 Arial, sans-serif;
        letter-spacing: 0;
        padding: 0.45rem 0.75rem;
        text-transform: uppercase;
      }

      h1 {
        margin: 1.25rem 0 0;
        font-size: 3.5rem;
        line-height: 1;
      }

      p {
        margin: 1rem auto 0;
        max-width: 32rem;
        color: #475569;
        font: 1.125rem/1.65 Arial, sans-serif;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        margin-top: 1.5rem;
        border-radius: 8px;
        background: #0b1220;
        color: #ffffff;
        font: 700 0.95rem/1 Arial, sans-serif;
        padding: 0.85rem 1.15rem;
        text-decoration: none;
      }

      a:focus-visible {
        outline: 3px solid #2563eb;
        outline-offset: 4px;
      }

      @media (max-width: 640px) {
        h1 {
          font-size: 2.4rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">404</span>
      <h1>Page not found</h1>
      <p>That route is outside the portfolio map, but the main site is ready.</p>
      <a href="/">Go home</a>
    </main>
  </body>
</html>
