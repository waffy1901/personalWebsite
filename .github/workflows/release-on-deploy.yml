name: Create deployment release

"on":
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify app
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: main/package-lock.json

      - name: Install dependencies
        working-directory: main
        run: npm ci

      - name: Lint
        working-directory: main
        run: npm run lint

      - name: Test
        working-directory: main
        run: npm test

      - name: Build
        working-directory: main
        run: npm run build

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0

      - name: Wait for Netlify production deploy
        env:
          EXPECTED_COMMIT: ${{ github.sha }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          set -euo pipefail

          if [ -z "${NETLIFY_AUTH_TOKEN}" ] || [ -z "${NETLIFY_SITE_ID}" ]; then
            echo "NETLIFY_AUTH_TOKEN and NETLIFY_SITE_ID secrets are required before creating deployment releases."
            exit 1
          fi

          for attempt in $(seq 1 45); do
            deploy_json="$(curl -fsS \
              -H "Authorization: Bearer ${NETLIFY_AUTH_TOKEN}" \
              "https://api.netlify.com/api/v1/sites/${NETLIFY_SITE_ID}/deploys?production=true&per_page=1")"
            deploy_state="$(printf '%s' "$deploy_json" | python3 -c 'import json, sys; deploys = json.load(sys.stdin); deploy = deploys[0] if deploys else {}; print(deploy.get("state", ""))')"
            deploy_commit="$(printf '%s' "$deploy_json" | python3 -c 'import json, sys; deploys = json.load(sys.stdin); deploy = deploys[0] if deploys else {}; print(deploy.get("commit_ref", ""))')"
            deploy_url="$(printf '%s' "$deploy_json" | python3 -c 'import json, sys; deploys = json.load(sys.stdin); deploy = deploys[0] if deploys else {}; print(deploy.get("deploy_ssl_url") or deploy.get("ssl_url") or "")')"

            if [ "$deploy_state" = "ready" ] && [ "$deploy_commit" = "$EXPECTED_COMMIT" ]; then
              echo "Netlify production deploy is ready for ${EXPECTED_COMMIT}: ${deploy_url}"
              break
            fi

            if [ "$attempt" = "45" ]; then
              echo "Timed out waiting for Netlify production deploy ${EXPECTED_COMMIT}. Last state=${deploy_state}, commit=${deploy_commit}, url=${deploy_url}"
              exit 1
            fi

            echo "Waiting for Netlify production deploy ${EXPECTED_COMMIT}; attempt ${attempt}/45 saw state=${deploy_state}, commit=${deploy_commit}"
            sleep 20
          done

      - name: Test deployed route checker
        run: python3 scripts/test_deployed_routes.py

      - name: Validate deployed routes
        env:
          SITE_URL: https://waffy.dev
        run: python3 scripts/check-deployed-routes.py --repo "$GITHUB_WORKSPACE" --site-url "$SITE_URL"

      - name: Validate legacy Netlify domain redirect
        env:
          LEGACY_RESUME_URL: https://waffy.netlify.app/waffyAhmedResume.pdf
        run: |
          set -euo pipefail
          legacy_headers="$(curl -fsSI "$LEGACY_RESUME_URL")"
          printf '%s\n' "$legacy_headers" | grep -Eiq '^HTTP/[0-9.]+ 301'
          printf '%s\n' "$legacy_headers" | tr -d '\r' | grep -Fiq 'Location: https://waffy.dev/waffyAhmedResume.pdf'

      - name: Create GitHub release
        uses: actions/github-script@v9
        with:
          script: |
            const shortSha = context.sha.slice(0, 7);
            const timestamp = new Date()
              .toISOString()
              .replace(/[-:]/g, "")
              .replace(/\.\d{3}Z$/, "Z");
            const tagName = `deploy-${timestamp}-${shortSha}`;
            const releaseName = `Deployment ${timestamp} (${shortSha})`;

            const body = [
              `Automated release for deployment commit ${context.sha}.`,
              "",
              `- Branch: ${context.ref.replace("refs/heads/", "")}`,
              `- Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "- Site: https://waffy.dev",
            ].join("\n");

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              target_commitish: context.sha,
              name: releaseName,
              body,
              draft: false,
              prerelease: false,
              generate_release_notes: true,
            });
