name: Main PR CI

"on":
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: main-pr-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify app
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: npm
          cache-dependency-path: main/package-lock.json

      - name: Install dependencies
        working-directory: main
        run: npm ci

      - name: Lint
        working-directory: main
        run: npm run lint

      - name: Test
        working-directory: main
        run: npm test

      - name: Build
        working-directory: main
        run: npm run build
